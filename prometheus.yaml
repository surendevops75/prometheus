# Prometheus Configuration

# --------------------------------------------------------
# GLOBAL SETTINGS
# --------------------------------------------------------

global:

  # Collect metrics every 15 seconds
  scrape_interval: 15s

  # Evaluate alert rules every 15 seconds
  evaluation_interval: 15s

# --------------------------------------------------------
# ALERTMANAGER CONFIGURATION
# --------------------------------------------------------

alerting:

  alertmanagers:

    - static_configs:

        - targets:

          # Alertmanager endpoint
          - "localhost:9093"

# --------------------------------------------------------
# ALERT RULE FILES
# --------------------------------------------------------

rule_files:

  # Load all alert rules
  - "alert-rules/*.yaml"

# --------------------------------------------------------
# SCRAPE CONFIGURATIONS
# --------------------------------------------------------

scrape_configs:

  # --------------------------------------------------------
  # PROMETHEUS SELF MONITORING
  # --------------------------------------------------------

  - job_name: "prometheus"

    static_configs:

      - targets:
          - "localhost:9090"

        labels:
          app: "prometheus"

  # --------------------------------------------------------
  # AWS EC2 SERVICE DISCOVERY
  # --------------------------------------------------------

  - job_name: ec2_sd

    ec2_sd_configs:

      - region: us-east-1

        port: 9100

        filters:

          - name: "tag:Monitoring"

            values:
              - "true"

    relabel_configs:

      - source_labels:
          - __meta_ec2_instance_id

        target_label: instance_id

      - source_labels:
          - __meta_ec2_tag_Name

        target_label: name